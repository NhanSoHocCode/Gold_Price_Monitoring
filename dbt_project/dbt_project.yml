name: gold_price_dbt
version: 1.0.0
config-version: 2

profile: 'gold_price_profile' # Control to profile.yml

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  gold_price_dbt:
    stageing:
      +materialized: view # Staging = View (only refesh)
    mart:
      +materialized: table # Mart = Table (Super fast Query)